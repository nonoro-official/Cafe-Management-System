# Single-origin reverse proxy for the isolated-LAN deployment.
# - Customer kiosk SPA is served at   /
# - Admin dashboard SPA is served at  /admin/
# - API is proxied at                 /api/  ->  api:5000
#
# Serving everything from one origin means first-party cookies work over plain
# HTTP and no CORS is involved.

upstream cafe_api {
    server api:5000;
}

server {
    listen 80;
    server_name _;

    # Customer SPA (root)
    root /usr/share/nginx/html/customer;
    index index.html;

    # Reasonable upload ceiling (matches express.json 10mb limit).
    client_max_body_size 10m;

    # API -> Express. proxy_pass has no path, so the full /api/... URI is
    # preserved and reaches app.use('/api', ...) unchanged.
    location /api/ {
        proxy_pass http://cafe_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin SPA under /admin/ (built with Vite base '/admin/').
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Customer SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
